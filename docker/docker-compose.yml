version: '3.8'

services:
  db-sudolife:
    image: postgres:16.2-alpine3.18
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_ROOT_USER}", "-d", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: sudolife-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_ROOT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./create_database.sql:/docker-entrypoint-initdb.d/create_database.sql
      - sudolife-db-data:/var/lib/postgresql/data
    networks:
      - sudolife-network

  app-sudolife:
    build:
      context: ..
      dockerfile: Dockerfile
    image: gabriellf1802/sudolife:${APP_VERSION}
    container_name: sudolife-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      API_SECURITY_TOKEN_SECRET: ${API_SECURITY_TOKEN_SECRET}
      API_SECURITY_TOKEN_ISSUER: ${API_SECURITY_TOKEN_ISSUER}
      API_SECURITY_TOKEN_EXPIRATION_MINUTES: ${API_SECURITY_TOKEN_EXPIRATION_MINUTES}
      AI_RUNNING_PLAN_PROVIDER_URL: http://ollama-sudolife:11434
      AI_RUNNING_PLAN_PROVIDER_MODEL: ${AI_RUNNING_PLAN_PROVIDER_MODEL:-llama3:8b}
    depends_on:
      db-sudolife:
        condition: service_healthy
      ollama-model-pull:
        condition: service_completed_successfully
    networks:
      - sudolife-network
    restart: always

  ollama-sudolife:
    image: ollama/ollama:latest
    container_name: sudolife-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - sudolife-ollama-data:/root/.ollama
    networks:
      - sudolife-network
    restart: unless-stopped

  ollama-model-pull:
    image: ollama/ollama:latest
    container_name: sudolife-ollama-model-pull
    environment:
      OLLAMA_HOST: http://ollama-sudolife:11434
      OLLAMA_MODEL: ${AI_RUNNING_PLAN_PROVIDER_MODEL:-llama3:8b}
    command: ["sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull \"$${OLLAMA_MODEL}\""]
    depends_on:
      ollama-sudolife:
        condition: service_started
    networks:
      - sudolife-network
    restart: "no"

networks:
  sudolife-network:
    driver: bridge

volumes:
  sudolife-db-data:
  sudolife-ollama-data:
