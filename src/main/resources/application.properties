##############################
# Application
##############################
spring.application.name=sudolife

##############################
# Persistence
##############################
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

##############################
# Security
##############################
api.security.token.secret=${API_SECURITY_TOKEN_SECRET:local-development-token-secret}
api.security.token.issuer=${API_SECURITY_TOKEN_ISSUER:sudolife-api}
api.security.token.expiration-minutes=${API_SECURITY_TOKEN_EXPIRATION_MINUTES:120}

##############################
# Strava
##############################
strava.client-id=${STRAVA_CLIENT_ID:local-strava-client-id}
strava.client-secret=${STRAVA_CLIENT_SECRET:local-strava-client-secret}
strava.authorization-url=${STRAVA_AUTHORIZATION_URL:https://www.strava.com/oauth/authorize}
strava.token-url=${STRAVA_TOKEN_URL:https://www.strava.com/api/v3/oauth/token}
strava.deauthorization-url=${STRAVA_DEAUTHORIZATION_URL:https://www.strava.com/oauth/deauthorize}
strava.connect-timeout=${STRAVA_CONNECT_TIMEOUT:2s}
strava.read-timeout=${STRAVA_READ_TIMEOUT:5s}

## Strava URLs ##
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/strava/callback}
strava.frontend-success-redirect-url=${STRAVA_FRONTEND_SUCCESS_REDIRECT_URL:http://localhost:3000/settings/connections/strava/success}
strava.frontend-failure-redirect-url=${STRAVA_FRONTEND_FAILURE_REDIRECT_URL:http://localhost:3000/settings/connections/strava/failure}

##############################
# Documentation
##############################
springdoc.swagger-ui.path=/swagger.html
